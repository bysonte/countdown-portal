version: '3.8'

services:
  pucana-portal:
    image: ghcr.io/bysonte/countdown-portal:latest
    container_name: pucana-portal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Ajusta el Host al dominio que vayas a usar
        - "traefik.http.routers.pucana.rule=Host(`pucana.bysonte.io`)"
        - "traefik.http.routers.pucana.entrypoints=websecure"
        - "traefik.http.routers.pucana.tls=true"
        - "traefik.http.routers.pucana.tls.certresolver=le"
        - "traefik.http.services.pucana.loadbalancer.server.port=80"
    networks:
      - traefik_public

networks:
  traefik_public:
    external: true
